modules:
  - type: script
    snippets:
      - "dnf install -y --nogpgcheck --repofrompath 'terra,https://repos.fyralabs.com/terra$releasever' terra-release"
      
  # Packages
  - type: dnf
    repos:
      keys:
        - https://packages.microsoft.com/keys/microsoft.asc
        - https://yum.tableplus.com/apt.tableplus.com.gpg.key
        - https://download.sublimetext.com/sublimehq-rpm-pub.gpg
      files:
        - https://yum.tableplus.com/rpm/x86_64/tableplus.repo
        - https://download.sublimetext.com/rpm/stable/x86_64/sublime-text.repo
      copr:
        - dejan/lazygit
        - lihaohong/yazi
        - rivenirvana/lazydocker
      nonfree: rpmfusion
      cleanup: true
    optfix:
        - tableplus
    install:
      packages:
        # System
        - dnf-plugins-core

        # CLI
        - fish
        - bat
        - starship
        - fastfetch
        - docker
        - docker-compose
        - helix
        - chezmoi
        - zoxide
        - mise
        - lazygit
        - yazi
        - ripgrep
        - fd-find
        - resvg
        - eza
        - btop
        - lazydocker
        - zellij
        - darkman
        - kubectl

        ## GUI
        - mpv
        - code
        - persepolis
        - zed
        - tableplus
        - antigravity
        - sublime-text
    remove:
      packages:
        - fedora-third-party
        - fedora-flathub-remote
        - fedora-workstation-repositories
      auto-remove: true
  
  - type: script
    snippets:
      - "wget -q -O - https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | K3D_INSTALL_DIR=/usr/bin bash"

  # Desktop Entry
  - type: files
    files:
      - source: system/usr/share/applications
        destination: /usr/share/applications
